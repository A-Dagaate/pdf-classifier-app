# Test profile configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# No context path in tests
server.servlet.context-path=

# Use temp directories for file storage
app.upload.dir=${java.io.tmpdir}/pdf-classifier-test/uploads
app.processed.dir=${java.io.tmpdir}/pdf-classifier-test/processed

# Placeholder ML service URL (overridden per-test as needed)
app.ml.service.base-url=http://localhost:19999

# JWT / TOTP
app.jwt.secret=testSecretKeyForJWTTokenGenerationMustBeLongEnough
app.jwt.expiration=86400000
app.totp.issuer=PDFClassifierTest

# Email - use defaults (mocked in tests)
spring.mail.host=localhost
spring.mail.port=25

# Quiet logging
logging.level.root=WARN
logging.level.com.example.pdfclassifier=INFO
