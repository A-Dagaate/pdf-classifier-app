# Production Configuration (Railway deployment)

# Server - Railway sets $PORT
server.port=${PORT:8080}
server.servlet.context-path=/

# PostgreSQL Database (Railway provides $DATABASE_URL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 console in production
spring.h2.console.enabled=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration (set via Railway env vars)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Application
app.upload.dir=./uploads
app.processed.dir=./processed
app.jwt.secret=${JWT_SECRET:change-me-in-production}
app.jwt.expiration=86400000
app.totp.issuer=PDFClassifier

# Thymeleaf - enable cache in production
spring.thymeleaf.cache=true

# Logging
logging.level.com.example.pdfclassifier=INFO
logging.level.org.springframework.security=WARN
