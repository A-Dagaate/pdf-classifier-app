# Server Configuration
server.port=8080
server.servlet.context-path=/pdf-classifier

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:pdfclassifier
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Email Configuration (Gmail example - update with your credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Application specific
app.upload.dir=./uploads
app.processed.dir=./processed
app.jwt.secret=yourSecretKeyForJWTTokenGenerationMustBeLongEnough
app.jwt.expiration=86400000
app.totp.issuer=PDFClassifier

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.example.pdfclassifier=DEBUG
logging.level.org.springframework.security=DEBUG
